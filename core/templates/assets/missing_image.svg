<svg width="{{ .Width }}" height="{{ .Height }}" viewBox="0 0 {{ .Width }} {{ .Height }}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="{{ .Title }}">
 <title>{{ .Title }}</title>
 {{- if .Description }}
 <desc>{{ .Description }}</desc>
 {{- end }}
 <rect width="100%" height="100%" fill="#f0f0f0"/>
 <rect x="1" y="1" width="{{ .InnerWidth }}" height="{{ .InnerHeight }}" fill="none" stroke="#d0d0d0" stroke-width="2" stroke-dasharray="8 6"/>
 <text x="24" y="40" dominant-baseline="middle" text-anchor="start" font-family="sans-serif" font-size="{{ .TitleSize }}" font-weight="600" fill="#666">{{ .Title }}</text>
 {{- if .DetailLines }}
 <text x="24" y="70" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="{{ .DetailSize }}" fill="#777">
 {{- range .DetailLines }}
  <tspan x="24" dy="1.35em">{{ . }}</tspan>
 {{- end }}
 </text>
 {{- end }}
</svg>
